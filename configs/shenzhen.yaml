# ============================================================
# Shenzhen — Pipeline Configuration
# Private car GPS trip data, Nov 1–15 2022, 25×20 grid
# ============================================================

city: shenzhen
label: "Shenzhen (Private Car GPS)"
user_label: "Vehicles"

# ── Raw data paths ───────────────────────────────────────────
paths:
  raw_dir:       "/Users/liubo/Desktop/HNU/Research/KDD2026/code/raw_data/shenzhen"
  processed_dir: "/Users/liubo/Desktop/HNU/Research/KDD2026/code/DynamicGraphMobilityGeneration/data/shenzhen"
  mobility_file: "shenzhen_202211.csv"
  poi_file:      "poi.csv"

# ── Study area & grid ────────────────────────────────────────
area:
  lon_min: 113.90
  lon_max: 114.15
  lat_min: 22.50
  lat_max: 22.70
  grid_rows: 20
  grid_cols: 25          # 25×20 = 500 regions

# ── Time range ───────────────────────────────────────────────
time:
  start_date: "2022-11-01"
  end_date:   "2022-11-15"
  train_dates: [1101, 1102, 1103, 1104, 1105, 1106, 1107, 1108, 1109, 1110, 1111, 1112, 1113, 1114]
  test_dates:  [1115]

# ── Train / test split ───────────────────────────────────────
split:
  test_ratio: 0.1
  seed: 42

# ── Dynamic graph construction ───────────────────────────────
graph:
  sigma_km:    3.0
  alpha_flow:  1.0
  max_dist_km: 10.0
  flow_topk:   0.20

# ── Pattern mining ───────────────────────────────────────────
pattern:
  leiden_resolution:   0.20
  leiden_seed:         42
  leiden_smooth_alpha: 0.4
  leiden_n_iter_cold:  20
  leiden_n_iter_warm:   5
  stay_bins:   [0, 1, 3, 12, 24]
  stay_labels: ["1h", "2-3h", "4-12h", "13-24h"]
  dist_bins:   [0, 1, 2, 3, 5]
  dist_labels: ["0-1km", "1-2km", "2-3km", "3-5km", ">5km"]

# ── POI categories ───────────────────────────────────────────
poi:
  categories:
    - "Transportation Facilities"
    - "Leisure & Entertainment"
    - "Companies & Enterprises"
    - "Healthcare"
    - "Commercial & Residential"
    - "Tourist Attractions"
    - "Automotive"
    - "Life Services"
    - "Science & Education & Culture"
    - "Shopping & Consumer Goods"
    - "Sports & Fitness"
    - "Hotels & Accommodations"
    - "Financial Institutions"
    - "Dining & Cuisine"
  category_map:
    "交通设施": "Transportation Facilities"
    "休闲娱乐": "Leisure & Entertainment"
    "公司企业": "Companies & Enterprises"
    "医疗保健": "Healthcare"
    "商务住宅": "Commercial & Residential"
    "旅游景点": "Tourist Attractions"
    "汽车相关": "Automotive"
    "生活服务": "Life Services"
    "科教文化": "Science & Education & Culture"
    "购物消费": "Shopping & Consumer Goods"
    "运动健身": "Sports & Fitness"
    "酒店住宿": "Hotels & Accommodations"
    "金融机构": "Financial Institutions"
    "餐饮美食": "Dining & Cuisine"
